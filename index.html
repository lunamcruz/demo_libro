<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourbook - Recap de Puro Concierto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Variables de Paleta de Colores --- */
        :root {
            --bg-dark: #0D0D0F;
            --text-white: #FFFFFF;
            --pink-primary: #890050;
            --pink-light: #E00C78;
            --overlay-black: rgba(0, 0, 0, 0.4);
        }

        /* --- Estilos Generales --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Contenedor Principal (Hero / Landing) --- */
        .landing-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(to bottom, rgba(13, 13, 15, 0.3), var(--overlay-black)), url('lou.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        /* --- Header (Títulos Superiores) --- */
        header {
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 4.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .subtitle {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.9;
        }

        /* --- Contenido Central (Distribución de Textos) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin: auto 0;
            width: 100%;
            z-index: 10;
        }

        /* Bloque Izquierdo */
        .quote-left {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            line-height: 1.1;
            letter-spacing: 2px;
            max-width: 450px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* Bloque Derecho */
        .artist-right {
            justify-self: end;
            text-align: right;
            max-width: 450px;
        }

        .artist-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            color: var(--pink-light);
            text-shadow: 0 0 10px var(--pink-primary);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .artist-subtext {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            line-height: 1.1;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* --- Footer (Controles e Info Inferior) --- */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            z-index: 10;
            margin-top: 2rem;
        }

        .credits-author {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        /* Contenedor Interactivo: Botón y Audio */
        .cta-audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        .btn-buy {
            font-family: 'Bebas Neue', sans-serif;
            background-color: var(--text-white);
            color: var(--bg-dark);
            padding: 0.6rem 3rem;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
            text-align: center;
        }

        .btn-buy:hover {
            transform: scale(1.02);
            background-color: #e0e0e0;
        }

        /* Estilo personalizado básico para el reproductor nativo */
        audio {
            width: 100%;
            height: 32px;
            border-radius: 50px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Código de barras simulado */
        .barcode {
            display: flex;
            background-color: var(--text-white);
            padding: 5px 15px;
            height: 45px;
            align-items: center;
            border-radius: 2px;
        }
        
        .barcode span {
            display: inline-block;
            background-color: #000;
            height: 100%;
            margin-right: 2px;
        }
        .barcode span:nth-child(odd) { width: 1px; }
        .barcode span:nth-child(even) { width: 3px; }
        .barcode span:nth-child(3n) { width: 4px; }
        .barcode span:nth-child(4n) { width: 2px; }

        /* --- RESPONSIVIDAD (Media Queries) --- */
        @media (min-width: 768px) {
            .landing-container {
                padding: 3rem;
            }

            .main-title {
                font-size: 6rem;
            }

            .content-grid {
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }

            footer {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-end;
            }

            .cta-audio-container {
                order: 2;
                max-width: 300px;
            }

            .credits-author {
                order: 1;
                margin-bottom: 5px;
            }

            .barcode {
                order: 3;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 3.5rem;
            }
            .subtitle {
                font-size: 0.9rem;
                letter-spacing: 4px;
            }
            .quote-left {
                font-size: 1.8rem;
            }
            .artist-name {
                font-size: 2.2rem;
            }
            .artist-subtext {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <main class="landing-container">
        
        <header>
            <h1 class="main-title">Tourbook</h1>
            <p class="subtitle">Recap de Puro Concierto</p>
        </header>

        <div class="content-grid">
            <div class="quote-left">
                Podría escribir mi autobiografía, pero los conciertos son mejores
            </div>
            
            <div class="artist-right">
                <h2 class="artist-name">Louis<br>Tomlinson</h2>
                <p class="artist-subtext">y los mejores fan proyects</p>
            </div>
        </div>

        <footer>
            <div class="credits-author">
                By Luna M Cruz
            </div>

            <div class="cta-audio-container">
                <button class="btn-buy">Buy Now</button>
                <audio controls>
                    <source src="Louis Tomlinson Silver tongues.mp3" type="audio/mpeg">
                    Tu navegador no soporta el elemento de audio.
                </audio>
            </div>

            <div class="barcode" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </footer>

    </main>

</body>
</html>
